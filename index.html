let capturedInstallEvent = null;
let installEventCallbacks = [];
if (typeof window !== "undefined") {
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    capturedInstallEvent = e;
    installEventCallbacks.forEach((cb) => cb(e));
  });
  window.addEventListener("appinstalled", () => {
    capturedInstallEvent = null;
    installEventCallbacks.forEach((cb) => cb(null));
  });
}
function useInstallPrompt() {
  const [event, setEvent] = useState(capturedInstallEvent);
  useEffect(() => {
    const cb = (e) => setEvent(e);
    installEventCallbacks.push(cb);
    return () => {
      installEventCallbacks = installEventCallbacks.filter((c) => c !== cb);
    };
  }, []);
  return event;
}

function b64urlToBuffer(b64url) {
  const b64 = b64url.replace(/-/g, "+").replace(/_/g, "/");
  const pad = b64.length % 4 ? "=".repeat(4 - b64.length % 4) : "";
  const bin = atob(b64 + pad);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
function bufferToB64url(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function registerBiometric(username) {
  if (!isWebAuthnAvailable()) return false;
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: "Painel do Ve\u00EDculo" },
        user: { id: userId, name: username, displayName: username },
        pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
        authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
        timeout: 60000
      }
    });
    if (!cred) return false;
    localStorage.setItem(BIOMETRIC_CRED_KEY, bufferToB64url(cred.rawId));
    localStorage.setItem(BIOMETRIC_USER_KEY, username);
    return true;
  } catch (e) {
    return false;
  }
}
async function verifyBiometric() {
  if (!isWebAuthnAvailable()) return null;
  const credId = (() => {
    try {
      return localStorage.getItem(BIOMETRIC_CRED_KEY);
    } catch (e) {
      return null;
    }
  })();
  if (!credId) return null;
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{ id: b64urlToBuffer(credId), type: "public-key" }],
        userVerification: "required",
        timeout: 60000
      }
    });
    if (!assertion) return null;
    return getBiometricUser();
  } catch (e) {
    return null;
  }
}

function loadUsers() {
  try {
    const raw = localStorage.getItem(USERS_KEY);
    if (!raw) return defaultUsers();
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed) || parsed.length === 0) return defaultUsers();
    return parsed;
  } catch (e) {
    return defaultUsers();

}

function recomputeFuelChain(entries, tankCapacity) {
